<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple 皮肤预览</title>
<style>
  :root {
    --bg-canvas: #F5F5F7;
    --bg-card: #FFFFFF;
    --bg-elevated: #EEEEF0;
    --bg-surface: #FFFFFF;
    --text-primary: #1D1D1F;
    --text-secondary: #6E6E73;
    --text-muted: #AEAEB2;
    --border-micro: #D2D2D7;
    --accent-blue: #007AFF;
    --accent-indigo: #5856D6;
    --accent-cyan: #5AC8FA;
    --cta-orange: #FF9500;
    --priority-urgent: #FF3B30;
    --priority-important: #FF9500;
    --priority-normal: #34C759;
    --cat-project: #007AFF;
    --cat-other: #AF52DE;
    --cat-credit: #FF2D55;
    --cat-study: #5856D6;
    --gradient-brand-from: #007AFF;
    --gradient-brand-to: #5856D6;
    --glass-blur: 20px;
    --glass-border: rgba(255, 255, 255, 0.6);
    --glass-shadow: 0 2px 12px rgba(0, 0, 0, 0.06), 0 0 1px rgba(0, 0, 0, 0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-canvas); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif; -webkit-font-smoothing: antialiased; }
  .layout { display: flex; height: 100vh; }
  .sidebar { width: 220px; background: rgba(255,255,255,0.72); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-right: 0.5px solid var(--border-micro); padding: 20px 0; flex-shrink: 0; }
  .sidebar-logo { padding: 0 20px 24px; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, var(--gradient-brand-from), var(--gradient-brand-to)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sidebar-section { padding: 0 12px; margin-bottom: 16px; }
  .sidebar-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; padding: 4px 8px; margin-bottom: 4px; }
  .sidebar-item { display: flex; align-items: center; gap: 10px; padding: 7px 10px; border-radius: 8px; font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: all 0.15s ease; }
  .sidebar-item:hover { background: rgba(0,0,0,0.04); color: var(--text-primary); }
  .sidebar-item.active { background: rgba(0,122,255,0.08); color: var(--accent-blue); font-weight: 500; }
  .sidebar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 52px; border-bottom: 0.5px solid var(--border-micro); display: flex; align-items: center; justify-content: space-between; padding: 0 28px; background: rgba(255,255,255,0.72); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
  .topbar-title { font-size: 15px; font-weight: 600; letter-spacing: -0.01em; }
  .topbar-skin { font-size: 12px; color: var(--accent-blue); font-weight: 500; padding: 4px 12px; border: 1px solid rgba(0,122,255,0.2); border-radius: 20px; background: rgba(0,122,255,0.06); }
  .content { flex: 1; padding: 28px; overflow-y: auto; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
  .stat-card { background: var(--bg-card); border: 0.5px solid var(--border-micro); border-radius: 16px; padding: 18px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.01em; }
  .stat-value { font-size: 28px; font-weight: 700; letter-spacing: -0.02em; }
  .stat-bar { height: 3px; border-radius: 1.5px; margin-top: 10px; opacity: 0.8; }
  .tasks { background: var(--bg-card); border: 0.5px solid var(--border-micro); border-radius: 16px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
  .task-header { padding: 16px 18px; border-bottom: 0.5px solid var(--border-micro); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }
  .task { display: flex; align-items: center; gap: 14px; padding: 14px 18px; border-bottom: 0.5px solid var(--border-micro); transition: background 0.15s ease; }
  .task:hover { background: rgba(0,0,0,0.015); }
  .task:last-child { border-bottom: none; }
  .task-check { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid var(--border-micro); flex-shrink: 0; transition: all 0.2s ease; }
  .task-check.done { background: var(--priority-normal); border-color: var(--priority-normal); }
  .task-check.done::after { content: '✓'; color: white; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; height: 100%; }
  .task-info { flex: 1; }
  .task-title { font-size: 14px; font-weight: 400; letter-spacing: -0.01em; }
  .task-title.done-text { text-decoration: line-through; color: var(--text-muted); }
  .task-meta { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
  .task-priority { width: 3px; height: 28px; border-radius: 1.5px; flex-shrink: 0; }
  .task-tag { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 500; letter-spacing: 0.01em; }
  .cat-tag { background: rgba(0,122,255,0.08); color: var(--cat-project); }
  .cat-tag.other { background: rgba(175,82,222,0.08); color: var(--cat-other); }
  .cat-tag.credit { background: rgba(255,45,85,0.08); color: var(--cat-credit); }
  .cat-tag.study { background: rgba(88,86,214,0.08); color: var(--cat-study); }
  .fab { position: fixed; bottom: 28px; right: 28px; width: 52px; height: 52px; border-radius: 16px; background: linear-gradient(135deg, var(--gradient-brand-from), var(--gradient-brand-to)); color: white; border: none; font-size: 24px; cursor: pointer; box-shadow: 0 4px 16px rgba(0,122,255,0.25); display: flex; align-items: center; justify-content: center; transition: transform 0.2s ease, box-shadow 0.2s ease; }
  .fab:hover { transform: scale(1.05); box-shadow: 0 6px 20px rgba(0,122,255,0.35); }
  .skin-label { position: fixed; top: 12px; right: 12px; background: rgba(255,255,255,0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 0.5px solid var(--border-micro); border-radius: 10px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--accent-blue); z-index: 100; }
</style>
</head>
<body>
<div class="skin-label">Apple 皮肤预览</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">TaskFlow</div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">分类</div>
      <div class="sidebar-item active"><span class="sidebar-dot" style="background:var(--cat-project)"></span>工作</div>
      <div class="sidebar-item"><span class="sidebar-dot" style="background:var(--cat-other)"></span>琐事</div>
      <div class="sidebar-item"><span class="sidebar-dot" style="background:var(--cat-credit)"></span>理财</div>
      <div class="sidebar-item"><span class="sidebar-dot" style="background:var(--cat-study)"></span>学习</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">视图</div>
      <div class="sidebar-item">📅 日历</div>
      <div class="sidebar-item">📋 清单</div>
      <div class="sidebar-item">⊞ 四象限</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">管理</div>
      <div class="sidebar-item">📦 归档</div>
      <div class="sidebar-item">⚙ 设置</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">6月 19日 周五</div>
      <div class="topbar-skin">Apple</div>
    </div>
    <div class="content">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">总任务</div>
          <div class="stat-value" style="color:var(--accent-blue)">12</div>
          <div class="stat-bar" style="background:var(--accent-blue)"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待完成</div>
          <div class="stat-value" style="color:var(--accent-indigo)">7</div>
          <div class="stat-bar" style="background:var(--accent-indigo)"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已完成</div>
          <div class="stat-value" style="color:var(--priority-normal)">5</div>
          <div class="stat-bar" style="background:var(--priority-normal)"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">紧急</div>
          <div class="stat-value" style="color:var(--priority-urgent)">2</div>
          <div class="stat-bar" style="background:var(--priority-urgent)"></div>
        </div>
      </div>
      <div class="tasks">
        <div class="task-header">📋 今日任务</div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-urgent)"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <div class="task-title">完成项目方案评审</div>
            <div class="task-meta">今天 14:00 · 工作项目</div>
          </div>
          <span class="task-tag cat-tag">工作</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-important)"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <div class="task-title">整理学习笔记</div>
            <div class="task-meta">今天 18:00 · 学习提升</div>
          </div>
          <span class="task-tag cat-tag study">学习</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-normal)"></div>
          <div class="task-check done"></div>
          <div class="task-info">
            <div class="task-title done-text">回复客户邮件</div>
            <div class="task-meta">已完成 · 工作项目</div>
          </div>
          <span class="task-tag cat-tag">工作</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-important)"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <div class="task-title">信用卡还款</div>
            <div class="task-meta">明天 · 理财</div>
          </div>
          <span class="task-tag cat-tag credit">理财</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-normal)"></div>
          <div class="task-check done"></div>
          <div class="task-info">
            <div class="task-title done-text">注册新账号</div>
            <div class="task-meta">已完成 · 琐事</div>
          </div>
          <span class="task-tag cat-tag other">琐事</span>
        </div>
      </div>
    </div>
  </div>
</div>
<button class="fab">+</button>
</body>
</html>
