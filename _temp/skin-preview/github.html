<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub 皮肤预览</title>
<style>
  :root {
    --bg-canvas: #0D1117;
    --bg-card: #161B22;
    --bg-elevated: #1C2128;
    --bg-surface: #0D1117;
    --text-primary: #E6EDF3;
    --text-secondary: #8B949E;
    --text-muted: #484F58;
    --border-micro: #30363D;
    --accent-blue: #58A6FF;
    --accent-indigo: #79C0FF;
    --accent-cyan: #39D353;
    --cta-orange: #F78166;
    --priority-urgent: #F85149;
    --priority-important: #D29922;
    --priority-normal: #39D353;
    --cat-project: #58A6FF;
    --cat-other: #BC8CFF;
    --cat-credit: #F78166;
    --cat-study: #39D353;
    --gradient-brand-from: #58A6FF;
    --gradient-brand-to: #79C0FF;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-canvas); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .layout { display: flex; height: 100vh; }
  .sidebar { width: 200px; background: var(--bg-card); border-right: 1px solid var(--border-micro); padding: 20px 0; flex-shrink: 0; }
  .sidebar-logo { padding: 0 20px 24px; font-size: 18px; font-weight: 700; color: var(--accent-blue); }
  .sidebar-section { padding: 0 12px; margin-bottom: 16px; }
  .sidebar-section-title { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 8px; margin-bottom: 4px; }
  .sidebar-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 13px; color: var(--text-secondary); cursor: pointer; }
  .sidebar-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .sidebar-item.active { background: var(--bg-elevated); color: var(--text-primary); font-weight: 500; }
  .sidebar-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { height: 48px; border-bottom: 1px solid var(--border-micro); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; background: var(--bg-surface); }
  .topbar-title { font-size: 14px; font-weight: 600; }
  .topbar-skin { font-size: 12px; color: var(--accent-blue); font-weight: 500; padding: 4px 10px; border: 1px solid var(--border-micro); border-radius: 6px; }
  .content { flex: 1; padding: 24px; overflow-y: auto; }
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--bg-card); border: 1px solid var(--border-micro); border-radius: 12px; padding: 16px; }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 700; }
  .stat-bar { height: 3px; border-radius: 2px; margin-top: 8px; }
  .tasks { background: var(--bg-card); border: 1px solid var(--border-micro); border-radius: 12px; overflow: hidden; }
  .task-header { padding: 14px 16px; border-bottom: 1px solid var(--border-micro); font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .task { display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border-micro); }
  .task:last-child { border-bottom: none; }
  .task-check { width: 18px; height: 18px; border-radius: 50%; border: 2px solid var(--text-muted); flex-shrink: 0; }
  .task-check.done { background: var(--priority-normal); border-color: var(--priority-normal); }
  .task-check.done::after { content: '✓'; color: white; font-size: 10px; display: flex; align-items: center; justify-content: center; height: 100%; }
  .task-info { flex: 1; }
  .task-title { font-size: 13px; font-weight: 500; }
  .task-title.done-text { text-decoration: line-through; color: var(--text-muted); }
  .task-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .task-priority { width: 4px; height: 24px; border-radius: 2px; flex-shrink: 0; }
  .task-tag { font-size: 11px; padding: 2px 8px; border-radius: 4px; font-weight: 500; }
  .cat-tag { background: rgba(88,166,255,0.15); color: var(--cat-project); }
  .cat-tag.other { background: rgba(188,140,255,0.15); color: var(--cat-other); }
  .cat-tag.credit { background: rgba(247,129,102,0.15); color: var(--cat-credit); }
  .cat-tag.study { background: rgba(57,211,83,0.15); color: var(--cat-study); }
  .fab { position: fixed; bottom: 24px; right: 24px; width: 48px; height: 48px; border-radius: 14px; background: linear-gradient(135deg, var(--gradient-brand-from), var(--gradient-brand-to)); color: white; border: none; font-size: 22px; cursor: pointer; box-shadow: 0 4px 12px rgba(88,166,255,0.3); display: flex; align-items: center; justify-content: center; }
  .skin-label { position: fixed; top: 12px; right: 12px; background: var(--bg-card); border: 1px solid var(--border-micro); border-radius: 8px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: var(--accent-blue); z-index: 100; }
</style>
</head>
<body>
<div class="skin-label">GitHub 皮肤预览</div>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-logo">TaskFlow</div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">分类</div>
      <div class="sidebar-item active"><span class="sidebar-dot" style="background:var(--cat-project)"></span>工作</div>
      <div class="sidebar-item"><span class="sidebar-dot" style="background:var(--cat-other)"></span>琐事</div>
      <div class="sidebar-item"><span class="sidebar-dot" style="background:var(--cat-credit)"></span>理财</div>
      <div class="sidebar-item"><span class="sidebar-dot" style="background:var(--cat-study)"></span>学习</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">视图</div>
      <div class="sidebar-item">📅 日历</div>
      <div class="sidebar-item">📋 清单</div>
      <div class="sidebar-item">⊞ 四象限</div>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-section-title">管理</div>
      <div class="sidebar-item">📦 归档</div>
      <div class="sidebar-item">⚙ 设置</div>
    </div>
  </div>
  <div class="main">
    <div class="topbar">
      <div class="topbar-title">6月 19日 周五</div>
      <div class="topbar-skin">GitHub</div>
    </div>
    <div class="content">
      <div class="stats">
        <div class="stat-card">
          <div class="stat-label">总任务</div>
          <div class="stat-value" style="color:var(--accent-blue)">12</div>
          <div class="stat-bar" style="background:var(--accent-blue)"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待完成</div>
          <div class="stat-value" style="color:var(--accent-indigo)">7</div>
          <div class="stat-bar" style="background:var(--accent-indigo)"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">已完成</div>
          <div class="stat-value" style="color:var(--priority-normal)">5</div>
          <div class="stat-bar" style="background:var(--priority-normal)"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">紧急</div>
          <div class="stat-value" style="color:var(--priority-urgent)">2</div>
          <div class="stat-bar" style="background:var(--priority-urgent)"></div>
        </div>
      </div>
      <div class="tasks">
        <div class="task-header">📋 今日任务</div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-urgent)"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <div class="task-title">完成项目方案评审</div>
            <div class="task-meta">今天 14:00 · 工作项目</div>
          </div>
          <span class="task-tag cat-tag">工作</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-important)"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <div class="task-title">整理学习笔记</div>
            <div class="task-meta">今天 18:00 · 学习提升</div>
          </div>
          <span class="task-tag cat-tag study">学习</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-normal)"></div>
          <div class="task-check done"></div>
          <div class="task-info">
            <div class="task-title done-text">回复客户邮件</div>
            <div class="task-meta">已完成 · 工作项目</div>
          </div>
          <span class="task-tag cat-tag">工作</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-important)"></div>
          <div class="task-check"></div>
          <div class="task-info">
            <div class="task-title">信用卡还款</div>
            <div class="task-meta">明天 · 理财</div>
          </div>
          <span class="task-tag cat-tag credit">理财</span>
        </div>
        <div class="task">
          <div class="task-priority" style="background:var(--priority-normal)"></div>
          <div class="task-check done"></div>
          <div class="task-info">
            <div class="task-title done-text">注册新账号</div>
            <div class="task-meta">已完成 · 琐事</div>
          </div>
          <span class="task-tag cat-tag other">琐事</span>
        </div>
      </div>
    </div>
  </div>
</div>
<button class="fab">+</button>
</body>
</html>
